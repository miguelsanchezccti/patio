<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyaTb_uvazW60jXS7eX9Rbv33m9ry0EAZyZDaAnqiLj3yUAi-2uyz5uPn5ymvjGLRrTMw/exec";

const MOV = {
  'E_V': { label: 'Entrada Vacío', bg: 'var(--vd)', border: 'var(--vd)' },
  'E_F': { label: 'Entrada Full', bg: 'var(--vd)', border: 'var(--vd)' },
  'S_D': { label: 'Salida Depósito', bg: 'var(--am)', border: 'var(--am)' },
  'S_C': { label: 'Salida Cliente', bg: 'var(--rj)', border: 'var(--rj)' },
  'INV': { label: 'Inventario Patio', bg: 'var(--or)', border: 'var(--or)' }
};

const BASE_CHASIS_CCTI = {
  "JK2591": "CONTENEDORES 20'",
  "GRDY34": "CONTENEDORES 40'", "GRDY35": "CONTENEDORES 40'", "GRDY36": "CONTENEDORES 40'",
  "GRDY37": "CONTENEDORES 40'", "GRDY38": "CONTENEDORES 40'", "GRDY39": "CONTENEDORES 40'",
  "PXKS67": "CONTENEDORES 20' Y 40'", "PXKS76": "CONTENEDORES 20' Y 40'", "PXKS86": "CONTENEDORES 20' Y 40'", 
  "PXKS96": "CONTENEDORES 20' Y 40'", "PXKT10": "CONTENEDORES 20' Y 40'", "HXHB32": "CORTINA", 
  "KYPR97": "CORTINA", "PWYL65": "CORTINA", "PWYL67": "CORTINA", "PWYL68": "CORTINA",
  "PWYL69": "CORTINA", "PWYL70": "CORTINA", "PWYL72": "CORTINA", "HXHT27": "CORTINA",
  "HXHT28": "CORTINA", "HXHT29": "CORTINA", "HXHT30": "CORTINA", "HXFB13": "FURGON REEFER"
};

const PREFIJOS_NAVIERAS = {
  "MSCU": "MSC", "MEDU": "MSC", "ONEU": "ONE", "MAEU": "MAERSK",
  "SUDU": "HAMBURG SÜD", "COSU": "COSCO", "OOLU": "OOCL"
};

let selectedMov = null;
let bitacora = JSON.parse(localStorage.getItem('ccti_bitacora')) || [];

// ROBUSTEZ: Recuperación de estado del inventario para evitar pérdidas por recarga de página
let esInventarioActivo = localStorage.getItem('ccti_inv_activo') === 'true';
let marcaTiempoInicioInv = localStorage.getItem('ccti_inv_inicio') ? new Date(localStorage.getItem('ccti_inv_inicio')) : null;
let historialPatentesEnSesion = JSON.parse(localStorage.getItem('ccti_inv_patentes')) || []; 
let ultimaUbicacionGuardada = localStorage.getItem('ccti_ultima_ub') || "";

document.addEventListener('DOMContentLoaded', () => {
  const opciones = document.querySelectorAll('.btn-mov');
  opciones.forEach(btn => {
    btn.addEventListener('click', () => {
      opciones.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMov = btn.getAttribute('data-type');
      
      const panelCronometro = document.getElementById('panel-cronometro-inv');
      if (selectedMov === 'INV') {
        panelCronometro.style.display = 'block';
      } else {
        panelCronometro.style.display = 'none';
      }
    });
  });
  
  const d = new Date();
  const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('nav-date').innerHTML = "CCTI S.A. — " + d.toLocaleDateString('es-ES', opcionesFecha);
  
  // Si había una sesión activa al recargar, restaurar la interfaz visual de inmediato
  if (esInventarioActivo) {
    restaurarInterfazInventario();
  }

  if (ultimaUbicacionGuardada) {
    document.getElementById('inp-lugar').value = ultimaUbicacionGuardada;
  }
  
  actualizarGraficos();
});

function detectarChasisMaster(valor) {
  if (!valor) {
    document.getElementById('auto-lbl').innerText = "";
    document.getElementById('inp-obs').value = "";
    return;
  }
  
  // Limpieza en tiempo real de caracteres especiales
  const ppuClean = valor.replace(/[^a-zA-Z0-9]/g, '').trim().toUpperCase();
  document.getElementById('inp-ppu').value = ppuClean;

  const selectChasis = document.getElementById('inp-chasis');
  const lblAuto = document.getElementById('auto-lbl');

  // Validación preventiva: Alerta visual inmediata sin borrar el campo de golpe para no frustrar la escritura
  if (esInventarioActivo && historialPatentesEnSesion.includes(ppuClean)) {
    lblAuto.innerText = `⚠️ DUPLICADO EN ESTA SESIÓN`;
    lblAuto.style.color = "var(--rj)";
    return;
  }

  if (BASE_CHASIS_CCTI[ppuClean]) {
    const chasisAsignado = BASE_CHASIS_CCTI[ppuClean];
    selectChasis.value = chasisAsignado;
    lblAuto.innerText = `⚡ Reconocido: ${chasisAsignado}`;
    lblAuto.style.color = "var(--vd)";
    
    evaluarFlujoContenedorYNaviera(document.getElementById('inp-cont').value);
  } else {
    lblAuto.innerText = "Patente Nueva / No en Maestro";
    lblAuto.style.color = "var(--txt3)";
  }
}

function evaluarFlujoContenedorYNaviera(valorContenedor) {
  const ppu = document.getElementById('inp-ppu').value.trim();
  const txtObs = document.getElementById('inp-obs');
  const inputCliente = document.getElementById('inp-cliente');
  const inputCont = document.getElementById('inp-cont');

  let contClean = valorContenedor.replace(/[^a-zA-Z0-9]/g, '').trim().toUpperCase();
  inputCont.value = contClean;

  if (!ppu) return;

  if (contClean === "") {
    txtObs.value = "DISPONIBLE";
  } else {
    txtObs.value = "OCUPADO";

    if (contClean.length >= 4) {
      const prefijo = contClean.substring(0, 4);
      if (PREFIJOS_NAVIERAS[prefijo]) {
        inputCliente.value = PREFIJOS_NAVIERAS[prefijo];
      }
    }
  }
}

function gestionarSesionInventario(estado) {
  const lblStatus = document.getElementById('inv-live-status');
  const btnStart = document.getElementById('btn-start-inv');
  const btnStop = document.getElementById('btn-stop-inv');

  if (estado === 'INICIAR') {
    esInventarioActivo = true;
    marcaTiempoInicioInv = new Date();
    historialPatentesEnSesion = [];
    
    localStorage.setItem('ccti_inv_activo', 'true');
    localStorage.setItem('ccti_inv_inicio', marcaTiempoInicioInv.toISOString());
    localStorage.setItem('ccti_inv_patentes', JSON.stringify([]));
    
    restaurarInterfazInventario();
  } 
  else if (estado === 'TERMINAR') {
    esInventarioActivo = false;
    const finInv = new Date();
    const difMs = finInv - marcaTiempoInicioInv;
    const mins = Math.floor(difMs / 60000);
    const segs = Math.floor((difMs % 60000) / 1000);

    // Limpieza de estados de inventario en LocalStorage
    localStorage.removeItem('ccti_inv_activo');
    localStorage.removeItem('ccti_inv_inicio');
    localStorage.removeItem('ccti_inv_patentes');

    lblStatus.innerText = "🟢 Estado: Esperando inicio de tandeo";
    lblStatus.style.background = "var(--gr)";
    lblStatus.style.color = "var(--txt2)";
    btnStart.disabled = false;
    btnStop.disabled = true;

    alert(`📋 Toma de Inventario Finalizada con Éxito.\n\n⏱️ Duración: ${mins} min ${segs} seg.\n🚚 Unidades Validadas en Patio: ${historialPatentesEnSesion.length}`);
  }
}

function restaurarInterfazInventario() {
  const lblStatus = document.getElementById('inv-live-status');
  const btnStart = document.getElementById('btn-start-inv');
  const btnStop = document.getElementById('btn-stop-inv');
  
  const tiempoFormateado = marcaTiempoInicioInv ? new Date(marcaTiempoInicioInv).toLocaleTimeString() : '';
  lblStatus.innerText = `⚠️ EN PROCESO — Iniciado a las: ${tiempoFormateado}`;
  lblStatus.style.background = "var(--or-l)";
  lblStatus.style.color = "var(--or)";
  btnStart.disabled = true;
  btnStop.disabled = false;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  
  const idx = ['reg', 'patio', 'log'].indexOf(tab);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  
  if(tab === 'patio' || tab === 'log') actualizarGraficos();
}

function registrarMovimiento() {
  if(!selectedMov) { alert('Por favor, selecciona un tipo de movimiento primero.'); return; }
  
  const ppu = document.getElementById('inp-ppu').value.trim().toUpperCase();
  const cont = document.getElementById('inp-cont').value.trim().toUpperCase();
  const tipo_chasis = document.getElementById('inp-chasis').value;
  const cliente = document.getElementById('inp-cliente').value.trim();
  const lugar = document.getElementById('inp-lugar').value.trim();
  let obs = document.getElementById('inp-obs').value.trim();
  
  // ROBUSTEZ: Validación de formato de Patente Chilena Estándar (4 letras + 2 números o 2 letras + 4 números)
  const formatoPPU = /^[A-Z]{4}\d{2}$|^[A-Z]{2}\d{4}$/;
  if(!ppu){ 
    alert('La patente (PPU) es obligatoria.'); 
    return; 
  }
  if(!formatoPPU.test(ppu)) {
    alert('Formato de Patente Inválido.\nDebe ser formato nuevo (AAAA11) o antiguo (AA1111) sin guiones.');
    return;
  }
  
  // ROBUSTEZ: Obligar a seleccionar un tipo de chasis para resguardar la consistencia de la base de datos
  if(!tipo_chasis) {
    alert('Por favor, asigne un Tipo de Chasis a la unidad antes de guardar.');
    return;
  }

  if (esInventarioActivo && historialPatentesEnSesion.includes(ppu)) {
    alert(`Error Crítico: La patente ${ppu} ya fue registrada como validada en esta ventana de inventario.`);
    return;
  }

  const ahora = new Date();
  const ts = ahora.toLocaleString('es-CL');
  
  const registro = {
    ts: ts,
    tipo: selectedMov,
    ppu: ppu,
    cont: cont || 'N/A',
    tipo_chasis: tipo_chasis,
    cliente: cliente || 'N/A',
    lugar: lugar || 'N/A',
    obs: obs || 'N/A'
  };
  
  if (esInventarioActivo) {
    historialPatentesEnSesion.push(ppu);
    localStorage.setItem('ccti_inv_patentes', JSON.stringify(historialPatentesEnSesion));
  }

  ultimaUbicacionGuardada = lugar;
  localStorage.setItem('ccti_ultima_ub', ultimaUbicacionGuardada);

  bitacora.unshift(registro);
  localStorage.setItem('ccti_bitacora', JSON.stringify(bitacora));
  
  enviarACloud(registro);
  
  // Limpieza de campos post-registro exitoso
  document.getElementById('inp-ppu').value = '';
  document.getElementById('inp-cont').value = '';
  document.getElementById('inp-cliente').value = '';
  document.getElementById('inp-obs').value = '';
  document.getElementById('auto-lbl').innerText = '';
  document.getElementById('inp-chasis').selectedIndex = 0;
  
  document.getElementById('inp-lugar').value = ultimaUbicacionGuardada;
  
  selectedMov = null;
  document.querySelectorAll('.btn-mov').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-cronometro-inv').style.display = 'none';
  
  alert('¡Movimiento guardado con éxito!');
  actualizarGraficos();
}

function enviarACloud(item) {
  const msgBox = document.getElementById('cloud-msg');
  msgBox.className = "cloud-status syncing";
  msgBox.innerText = "⏳ Sincronizando con la oficina en línea...";
  
  const payload = {
    ts: item.ts,
    movimiento: MOV[item.tipo]?.label || item.tipo,
    ppu: item.ppu,
    contenedor: item.cont,
    tipo_chasis: item.tipo_chasis,
    cliente: item.cliente,
    lugar: item.lugar,
    obs: item.obs
  };

  fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    cache: "no-cache",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    msgBox.className = "cloud-status success";
    msgBox.innerText = "✅ Sincronizado con Google Sheets con éxito";
    setTimeout(() => msgBox.style.display = 'none', 3000);
  })
  .catch(err => {
    console.error(err);
    msgBox.className = "cloud-status error";
    msgBox.innerText = "❌ Guardado localmente. Se subirá al recuperar señal.";
  });
}

function actualizarGraficos() {
  let ent = 0, sal = 0;
  let html = '';
  
  bitacora.forEach(r => {
    if(r.tipo && r.tipo.startsWith('E')) ent++;
    if(r.tipo && r.tipo.startsWith('S')) sal++;
    
    const labelMov = MOV[r.tipo]?.label || r.tipo;
    const borderCol = MOV[r.tipo]?.bg || '#888';
    
    html += `
      <div class="log-item" style="border-left-color:${borderCol}">
        <span class="log-time">${r.ts ? r.ts.split(' ')[1] : ''}</span>
        <p>${labelMov} — 🚘 ${r.ppu}</p>
        <p>📦 Cont: ${r.cont} | 🛞 Chasis: ${r.tipo_chasis}</p>
        <p>🏢 Cli: ${r.cliente} | 📍 Pos: ${r.lugar}</p>
        ${r.obs !== 'N/A' ? ` <p style="font-style:italic;color:var(--txt3);margin-top:2px">⚠️ Obs: ${r.obs}</p>` : ''}
      </div>
    `;
  });
  
  document.getElementById('stat-ent').innerText = ent;
  document.getElementById('stat-sal').innerText = sal;
  document.getElementById('log-list').innerHTML = html || '<p style="color:var(--txt3);text-align:center;padding:20px;font-size:13px">No hay registros hoy</p>';

  const movCount = { 'E_V': 0, 'E_F': 0, 'S_D': 0, 'S_C': 0, 'INV': 0 };
  bitacora.forEach(r => { if(movCount[r.tipo] !== undefined) movCount[r.tipo]++; });
  const maxMov = Math.max(...Object.values(movCount), 1);
  
  document.getElementById('mov-chart').innerHTML = Object.entries(MOV).map(([k,m]) => {
    const n = movCount[k]; const pct = Math.round(n/maxMov*100);
    return `
      <div class="bar-wrap">
        <div class="bar-label"><span style="font-size:11px">${m.label}</span><span style="font-weight:700">${n}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${m.bg}"></div></div>
      </div>
    `;
  }).join('');
}

function exportCSV() {
  if(!bitacora.length){ alert('Sin movimientos para exportar'); return; }
  const rows = [['Fecha y Hora','Movimiento','PPU','Contenedor','Tipo chasis','Cliente','Lugar','Obs']];
  bitacora.forEach(r => rows.push([r.ts, MOV[r.tipo]?.label || r.tipo, r.ppu, r.cont, r.tipo_chasis, r.cliente, r.lugar, r.obs]));
  
  let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + rows.map(e => e.map(val => `"${val}"`).join(",")).join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `Inventario_Patio_${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

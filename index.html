<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Patio Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --az:#1F3864;--az2:#2E75B6;--az-l:#D6E4F0;
  --vd:#1D6A2E;--vd-l:#E2EFDA;
  --am:#7D6608;--am-l:#FFF2CC;
  --rj:#9C0006;--rj-l:#FFE7E7;
  --pu:#3A1F6B;--pu-l:#EDE7FF;
  --gr:#F5F5F5;--gr2:#E0E0E0;
  --txt:#1a1a1a;--txt2:#555;--txt3:#888;
  --card:#fff;--bg:#F0F2F5;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.4}
.navbar{background:var(--az);color:#fff;padding:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);text-align:center}
.navbar h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.navbar p{font-size:12px;color:var(--az-l);margin-top:2px}
.container{padding:16px;max-width:500px;margin:0 auto;padding-bottom:80px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--az);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
.grid-mov{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-mov{background:var(--gr);border:2px solid var(--gr2);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s ease;display:flex;flex-direction:column;align-items:center;gap:4px}
.btn-mov span:first-child{font-size:18px}.btn-mov span:last-child{font-size:11px;font-weight:600;color:var(--txt2)}
.btn-mov.active[data-type="E_V"]{background:var(--vd-l);border-color:var(--vd);color:var(--vd)}
.btn-mov.active[data-type="E_F"]{background:var(--vd-l);border-color:var(--vd);color:var(--vd)}
.btn-mov.active[data-type="S_D"]{background:var(--am-l);border-color:var(--am);color:var(--am)}
.btn-mov.active[data-type="S_C"]{background:var(--rj-l);border-color:var(--rj);color:var(--rj)}
.btn-mov.active[data-type="X_O"]{background:var(--pu-l);border-color:var(--pu);color:var(--pu)}
.form-group{margin-bottom:12px}.form-group label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:4px;text-transform:uppercase}
.input-text,select{width:100%;padding:11px;border:1.5px solid var(--gr2);border-radius:8px;font-size:14px;outline:none;background:#fff;transition:border-color .2s}
.input-text:focus,select:focus{border-color:var(--az2)}
.input-text::placeholder{color:var(--txt3);font-size:13px}
.row-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;background:var(--az);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(31,56,100,.3);transition:all .2s;margin-top:4px}
.btn-submit:active{transform:scale(.98);box-shadow:none}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--gr);padding:12px;border-radius:10px;text-align:center;border:1px solid var(--gr2)}
.stat-box p{font-size:10px;color:var(--txt2);font-weight:700;text-transform:uppercase}
.stat-box h3{font-size:20px;color:var(--az);margin-top:2px;font-weight:800}
.bar-chart{margin-top:8px}.bar-wrap{margin-bottom:8px}.bar-label{display:flex;justify-content:between;font-size:12px;margin-bottom:2px;font-weight:500;justify-content:space-between}
.bar-track{background:var(--gr2);height:8px;border-radius:4px;overflow:hidden}.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.log-item{background:var(--gr);padding:10px;border-radius:8px;margin-bottom:8px;border-left:4px solid var(--gr2);font-size:12px;position:relative}
.log-item p:first-child{font-weight:700;color:var(--txt);margin-bottom:2px}
.log-item p:last-child{color:var(--txt2);font-size:11px}
